<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Status Card</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #56ccf2, #2f80ed);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }

    .card {
      background: white;
      padding: 25px 35px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      text-align: center;
      width: 300px;
    }

    .title {
      font-size: 1.6em;
      color: #2f80ed;
      margin-bottom: 10px;
    }

    .status {
      display: inline-block;
      padding: 8px 15px;
      border-radius: 20px;
      font-weight: bold;
      background-color: #27ae60;
      color: white;
      margin: 10px 0;
    }

    .result {
      font-size: 1.1em;
      color: #444;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">Agriculture</div>
    <div class="status">TRUE</div>
    <div class="result">{{result}}</div>
	<div>https://drive.google.com/uc?export=download&id=1mcMGICHVIRz9eUvqYJZyca1G1_5VPurV</div>
  </div>

</body>
</html>
